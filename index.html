<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรายรับรายจ่าย</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Header Section -->
        <header class="app-header">
            <h1 class="app-title">ระบบรายรับรายจ่าย</h1>
            <p class="app-subtitle">จัดการเงินอย่างชาญฉลาด</p>

            <!-- Summary Cards -->
            <div class="summary-cards">
                <div class="card">
                    <span class="card-label">รายรับทั้งหมด</span>
                    <span class="card-amount" id="total-income">฿0.00</span>
                </div>
                <div class="card card--balance">
                    <span class="card-label">ยอดคงเหลือ</span>
                    <span class="card-amount" id="balance">฿0.00</span>
                </div>
                <div class="card">
                    <span class="card-label">รายจ่ายทั้งหมด</span>
                    <span class="card-amount" id="total-expense">฿0.00</span>
                </div>
            </div>
        </header>

        <!-- Form Section -->
        <section class="form-section">
            <h2 class="section-title">เพิ่มรายการใหม่</h2>
            <form class="form" id="transaction-form">
                <div class="form-group">
                    <label for="description">รายละเอียด</label>
                    <input type="text" id="description" placeholder="เช่น ค่าอาหาร, เงินเดือน" required>
                </div>

                <div class="form-group">
                    <label for="amount">จำนวนเงิน (บาท)</label>
                    <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="type">ประเภท</label>
                    <select id="type">
                        <option value="income">รายรับ</option>
                        <option value="expense">รายจ่าย</option>
                    </select>
                </div>

                <button type="submit" class="btn btn--primary">เพิ่มรายการ</button>
            </form>
        </section>

        <!-- Transaction List Section -->
        <section class="list-section">
            <div class="list-header">
                <h2 class="section-title">รายการล่าสุด</h2>
                <button class="btn btn--danger btn--small" id="clear-all-btn"
                    style="display: none;">ล้างทั้งหมด</button>
            </div>

            <ul class="transaction-list" id="transaction-list"></ul>

            <!-- Empty State -->
            <div class="empty-state" id="empty-state">
                <p>ยังไม่มีรายการใดๆ</p>
                <p>เริ่มต้นโดยเพิ่มรายการแรกของคุณด้านบน</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>

</html>
